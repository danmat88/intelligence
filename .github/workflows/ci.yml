name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test -- --ci

  functions:
    name: Cloud Function build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
        working-directory: functions
      - run: npm run build
        working-directory: functions

  rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4 # the Firestore emulator runs on the JVM
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci
      # Pin firebase-tools: 15+ requires Java 21, so unpinned `latest` broke CI
      # against the Java 17 above. 14.18.0 is the version verified locally with
      # Java 17 (14 rules tests green). Bump the CLI and the JDK together.
      - run: npm install -g firebase-tools@14.18.0
      - run: npm run test:rules
